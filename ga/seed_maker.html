<!DOCTYPE html>
<html>
<head>
    <title>S35 Cascade Designer (v3)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 20px; display: flex; gap: 20px; height: calc(100vh - 40px); }
        .main-container { display: flex; flex-direction: column; gap: 20px; flex-grow: 1; min-width: 450px; max-width: 600px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #3498db #2c3e50; }
        .controls, .settings { background: #34495e; padding: 20px; border-radius: 8px; }
        h2, h3, h4 { margin-top: 0; border-bottom: 1px solid #7f8c8d; padding-bottom: 10px; }
        h4 { border-bottom: none; padding-bottom: 4px; color: #bdc3c7;}
        textarea { width: 100%; height: 300px; background: #2c3e50; color: white; border: 1px solid #7f8c8d; border-radius: 4px; padding: 10px; box-sizing: border-box; font-family: monospace; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 5px; transition: background-color 0.2s; margin-top: 10px; width: 100%; }
        button:hover { background-color: #2980b9; }
        #simulation-container { min-width: 1000px; height: 100%; background-color: #1d2834; border-radius: 8px; overflow: hidden; position: relative; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .setting-item label { flex-basis: 60%; font-size: 14px; }
        .setting-item input { flex-basis: 40%; background: #2c3e50; border: 1px solid #7f8c8d; color: white; padding: 5px; border-radius: 4px; }
        .ramp-settings { border: 1px solid #7f8c8d; border-radius: 6px; padding: 15px; margin-top: 15px; }
        .ramp-settings.special-ramp { border-color: #3498db; }
    </style>
</head>
<body>
    <!-- Container for the Matter.js canvas -->
    <div id="simulation-container"></div>

    <!-- UI Controls Column -->
    <div class="main-container">
        <div class="controls">
            <h2>S35 Chromosome Loader</h2>
            <textarea id="chromosome-input">{
  "channelWidth": 2000,
  "detectorOffset": -800,
  "conveyorDropX": 2000,
  "conveyorDropWidth": 300,
  "cascadingRamps": [
    {
      "side": "right",
      "y_position": 300,
      "angle": -0.2,
      "vibratorAmplitude": 0.1,
      "vibratorFrequency": 10
    },
    {
      "side": "left",
      "y_position": 850,
      "angle": 0.2,
      "vibratorAmplitude": 0.1,
      "vibratorFrequency": 10
    },
    {
      "side": "right",
      "y_position": 1400,
      "angle": -0.2,
      "vibratorAmplitude": 0.05,
      "vibratorFrequency": 5
    },
    {
      "side": "left",
      "y_position": 1900,
      "angle": 0.2,
      "vibratorAmplitude": 0,
      "vibratorFrequency": 0
    },
    {
      "side": "right",
      "y_position": 2400,
      "vibratorAmplitude": 0,
      "vibratorFrequency": 0
    }
  ]
}</textarea>
            <button id="load-paste-button">Load & Visualize</button>
        </div>
        <div class="settings">
            <h3>Design Settings</h3>
            <div id="settings-dashboard">
                <p>Load a chromosome to see its settings.</p>
            </div>
             <button id="update-visualization-button" style="display: none;">Update Visualization</button>
        </div>
    </div>

    <script type="module">
        // --- S35 Constants ---
        const MACHINE_HEIGHT = 3000;
        const MACHINE_WIDTH = 2400;
        const DETECTOR_WIDTH = 300;

        // --- Main Application State ---
        let currentChromosome = null;
        let visualizer = null;

        // --- UI Element References ---
        const loadPasteButton = document.getElementById('load-paste-button');
        const chromosomeInput = document.getElementById('chromosome-input');
        const settingsDashboard = document.getElementById('settings-dashboard');
        const updateVisButton = document.getElementById('update-visualization-button');

        class Visualizer {
            constructor(containerElement) {
                this.Matter = Matter;
                const { Engine, Render, Runner, World, Composite } = this.Matter;

                this.engine = Engine.create({ gravity: { y: 0 } });
                this.world = this.engine.world;

                this.render = Render.create({
                    element: containerElement,
                    engine: this.engine,
                    options: { width: MACHINE_WIDTH, height: MACHINE_HEIGHT, wireframes: false, background: '#2c3e50' }
                });

                this.runner = Runner.create();
                Render.run(this.render);
                Runner.run(this.runner, this.engine);
                Matter.Render.lookAt(this.render, { min: { x: 0, y: 0 }, max: { x: MACHINE_WIDTH, y: MACHINE_HEIGHT } });

                this.Matter.Events.on(this.render, 'afterRender', () => {
                    this.drawGridAndLabels(this.render.context, MACHINE_WIDTH, MACHINE_HEIGHT);
                });
            }

            drawGridAndLabels(context, width, height) {
                context.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                context.fillStyle = 'rgba(255, 255, 255, 0.4)';
                context.font = '12px Arial';
                context.lineWidth = 1;
                for (let x = 100; x < width; x += 100) {
                    context.beginPath(); context.moveTo(x, 0); context.lineTo(x, height); context.stroke();
                    context.fillText(`${x}`, x + 5, 15);
                }
                for (let y = 100; y < height; y += 100) {
                    context.beginPath(); context.moveTo(0, y); context.lineTo(width, y); context.stroke();
                    context.fillText(`${y}`, 5, y - 5);
                }
            }
            
            drawS35Board(chromosome) {
                if (!chromosome) return;
                const { World, Composite } = this.Matter;
                Composite.clear(this.world, false);
                const boardBodies = this.createBoardFromS35Chromosome(chromosome);
                World.add(this.world, boardBodies);
            }

            createBoardFromS35Chromosome(chromosome) {
                const { Bodies, Vector } = this.Matter;
                const allBodies = [];
                const wallThickness = 20;
                const wallOptions = { isStatic: true, render: { fillStyle: '#95a5a6' } };
                const { channelWidth, cascadingRamps, detectorOffset, conveyorDropX, conveyorDropWidth } = chromosome;

                const channelCenterX = MACHINE_WIDTH / 2;
                const leftWallX = channelCenterX - (channelWidth / 2);
                const rightWallX = channelCenterX + (channelWidth / 2);

                allBodies.push(Bodies.rectangle(leftWallX, MACHINE_HEIGHT / 2, wallThickness, MACHINE_HEIGHT, { ...wallOptions }));
                allBodies.push(Bodies.rectangle(rightWallX, MACHINE_HEIGHT / 2, wallThickness, MACHINE_HEIGHT, { ...wallOptions }));
                allBodies.push(Bodies.rectangle(channelCenterX, MACHINE_HEIGHT - 5, channelWidth + wallThickness, 10, { ...wallOptions, render: { fillStyle: '#808e9b' } }));
                
                const detectorX = channelCenterX + detectorOffset;
                const detector = Bodies.rectangle(detectorX, MACHINE_HEIGHT - 15, DETECTOR_WIDTH, 10, { isStatic: true, isSensor: true, render: { fillStyle: 'rgba(46, 204, 113, 0.7)' } });
                allBodies.push(detector);

                const dropZone = Bodies.rectangle(conveyorDropX, 25, conveyorDropWidth, 50, { isStatic: true, isSensor: true, render: { fillStyle: 'rgba(231, 76, 60, 0.25)', strokeStyle: 'rgba(231, 76, 60, 0.5)', lineWidth: 1 }});
                allBodies.push(dropZone);

                cascadingRamps.forEach((ramp, index) => {
                    const isLastRamp = index === cascadingRamps.length - 1;
                    let rampLength, rampAngle, rampCenterX, rampCenterY;
                    const rampThickness = 10;
                    const attachX = ramp.side === 'left' ? leftWallX + (wallThickness / 2) : rightWallX - (wallThickness / 2);

                    if (isLastRamp) {
                        // **SPECIAL RULE FOR LAST RAMP**
                        const pivotPoint = Vector.create(attachX, ramp.y_position);
                        const targetPoint = Vector.create(detectorX + (DETECTOR_WIDTH / 2), MACHINE_HEIGHT - 20);
                        const rampVector = Vector.sub(targetPoint, pivotPoint);
                        
                        rampAngle = Vector.angle(rampVector, Vector.create(1, 0));
                        rampLength = Vector.magnitude(rampVector);
                        
                        const rampCenter = Vector.add(pivotPoint, Vector.mult(Vector.normalise(rampVector), rampLength / 2));
                        rampCenterX = rampCenter.x;
                        rampCenterY = rampCenter.y;
                    } else {
                        // Standard rule for all other ramps
                        rampLength = channelWidth * 0.85;
                        rampAngle = ramp.angle;
                        const pivotOffsetX = (rampLength / 2) * Math.cos(rampAngle);
                        const pivotOffsetY = (rampLength / 2) * Math.sin(rampAngle);
                        rampCenterX = ramp.side === 'left' ? attachX + pivotOffsetX : attachX - pivotOffsetX;
                        rampCenterY = ramp.y_position + (ramp.side === 'left' ? pivotOffsetY : -pivotOffsetY);
                    }

                    const rampBody = Bodies.rectangle(rampCenterX, rampCenterY, rampLength, rampThickness, {
                        isStatic: true,
                        angle: rampAngle,
                        render: { fillStyle: '#bdc3c7' }
                    });
                    allBodies.push(rampBody);
                });
                return allBodies;
            }
        }

        function processChromosome() {
            try {
                const chromosome = JSON.parse(chromosomeInput.value);
                if (!chromosome.channelWidth || !chromosome.cascadingRamps) {
                    throw new Error("Invalid S35 chromosome.");
                }
                currentChromosome = chromosome;
                visualizer.drawS35Board(currentChromosome);
                populateSettings(currentChromosome);
                updateVisButton.style.display = 'block';
            } catch (e) {
                alert("Error parsing S35 JSON: " + e.message);
            }
        }

        function populateSettings(chromosome) {
            settingsDashboard.innerHTML = `
                <h3>Machine Parameters</h3>
                <div class="setting-item"><label>Channel Width</label><input type="number" id="setting-channelWidth" value="${chromosome.channelWidth}"></div>
                <div class="setting-item"><label>Detector Offset</label><input type="number" id="setting-detectorOffset" value="${chromosome.detectorOffset}"></div>
                <div class="setting-item"><label>Conveyor Drop X</label><input type="number" id="setting-conveyorDropX" value="${chromosome.conveyorDropX}"></div>
                <div class="setting-item"><label>Conveyor Drop Width</label><input type="number" id="setting-conveyorDropWidth" value="${chromosome.conveyorDropWidth}"></div>
            `;

            chromosome.cascadingRamps.forEach((ramp, index) => {
                const isLastRamp = index === chromosome.cascadingRamps.length - 1;
                const rampDiv = document.createElement('div');
                rampDiv.className = isLastRamp ? 'ramp-settings special-ramp' : 'ramp-settings';
                let angleInput = isLastRamp 
                    ? `<div class="setting-item"><label>Angle (radians)</label><input type="text" value="AUTO" disabled></div>`
                    : `<div class="setting-item"><label>Angle (radians)</label><input type="number" step="0.1" data-index="${index}" data-prop="angle" value="${ramp.angle}"></div>`;

                rampDiv.innerHTML = `
                    <h4>Ramp ${index + 1} (${ramp.side}) ${isLastRamp ? '[TARGETING]' : ''}</h4>
                    <div class="setting-item"><label>Y Position</label><input type="number" step="10" data-index="${index}" data-prop="y_position" value="${ramp.y_position}"></div>
                    ${angleInput}
                    <div class="setting-item"><label>Vibrator Amplitude</label><input type="number" step="0.01" data-index="${index}" data-prop="vibratorAmplitude" value="${ramp.vibratorAmplitude}"></div>
                    <div class="setting-item"><label>Vibrator Frequency</label><input type="number" step="1" data-index="${index}" data-prop="vibratorFrequency" value="${ramp.vibratorFrequency}"></div>
                `;
                settingsDashboard.appendChild(rampDiv);
            });
        }
        
        function getSettingsFromUI() {
            const newChromosome = {
                channelWidth: parseInt(document.getElementById('setting-channelWidth').value),
                detectorOffset: parseInt(document.getElementById('setting-detectorOffset').value),
                conveyorDropX: parseInt(document.getElementById('setting-conveyorDropX').value),
                conveyorDropWidth: parseInt(document.getElementById('setting-conveyorDropWidth').value),
                cascadingRamps: []
            };

            const rampSettingsDivs = settingsDashboard.querySelectorAll('.ramp-settings');
            rampSettingsDivs.forEach((div, index) => {
                const rampData = { side: currentChromosome.cascadingRamps[index].side };
                const inputs = div.querySelectorAll('input[data-index]');
                inputs.forEach(input => {
                    const prop = input.dataset.prop;
                    rampData[prop] = parseFloat(input.value);
                });
                // For the last ramp, the angle might not be in the UI, so we don't add it
                if (currentChromosome.cascadingRamps[index].angle !== undefined && rampData.angle === undefined) {
                    rampData.angle = currentChromosome.cascadingRamps[index].angle;
                }
                newChromosome.cascadingRamps.push(rampData);
            });
            
            return newChromosome;
        }

        function initializeApp() {
            visualizer = new Visualizer(document.getElementById('simulation-container'));
            processChromosome();
            loadPasteButton.addEventListener('click', processChromosome);
            
            updateVisButton.addEventListener('click', () => {
                const uiChromosome = getSettingsFromUI();
                currentChromosome = uiChromosome;
                chromosomeInput.value = JSON.stringify(uiChromosome, null, 2);
                visualizer.drawS35Board(uiChromosome);
            });
        }

        initializeApp();
    </script>
</body>
</html>

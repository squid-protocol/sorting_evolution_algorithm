<!DOCTYPE html>
<html>
<head>
    <title>S35 Metareport Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 20px; }
        .container { max-width: 1800px; margin: auto; }
        h1, h2 { color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); gap: 20px; }
        .chart-container { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 20px; }
        .controls { background: #34495e; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 5px; transition: background-color 0.2s; }
        button:hover { background-color: #2980b9; }
        #file-status { margin-top: 10px; font-style: italic; color: #95a5a6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>S35 Metareport Visualizer</h1>
        <div class="controls">
            <button id="load-report-button">Load Meta-Report File (.json)</button>
            <input type="file" id="file-input" accept=".json" style="display: none;" />
            <p id="file-status">No report loaded. Please load a 'plinko_s35_metareport_run[...].json' file.</p>
        </div>
        <div class="chart-grid">
            <div class="chart-container">
                <h2>Fitness & Evolution Dynamics</h2>
                <canvas id="fitnessChart"></canvas>
            </div>
             <div class="chart-container">
                <h2>Champion Chromosome Timeline</h2>
                <canvas id="championChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Population Exit Status</h2>
                <canvas id="exitReasonChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Best Performer's Core Metrics</h2>
                <canvas id="performanceChart"></canvas>
            </div>
             <div class="chart-container">
                <h2>Generation Duration</h2>
                <canvas id="durationChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const MOVING_AVERAGE_WINDOW = 5;

            const loadButton = document.getElementById('load-report-button');
            const fileInput = document.getElementById('file-input');
            const fileStatus = document.getElementById('file-status');
            let charts = {};

            loadButton.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileLoad);

            function calculateMovingAverage(data, windowSize) {
                if (!data || data.length < windowSize) return data;
                let smoothedData = [];
                for (let i = 0; i < data.length; i++) {
                    const start = Math.max(0, i - windowSize + 1);
                    const end = i + 1;
                    const windowSlice = data.slice(start, end);
                    const sum = windowSlice.reduce((a, b) => a + (b || 0), 0);
                    smoothedData.push(sum / windowSlice.length);
                }
                return smoothedData;
            }

            function handleFileLoad(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const reportData = JSON.parse(e.target.result);
                        if (!Array.isArray(reportData) || reportData.length === 0) {
                            throw new Error("Invalid or empty report file.");
                        }
                        fileStatus.textContent = `Loaded report for ${reportData.length} generations.`;
                        fileStatus.style.color = '#2ecc71';
                        renderCharts(reportData);
                    } catch (error) {
                        fileStatus.textContent = `Error: ${error.message}`;
                        fileStatus.style.color = '#e74c3c';
                    }
                };
                reader.readAsText(file);
            }

            function renderCharts(data) {
                Object.values(charts).forEach(chart => chart.destroy());

                const labels = data.map(gen => gen.generation);

                // --- Chart 1: Fitness & Evolution Dynamics ---
                const fitnessCtx = document.getElementById('fitnessChart').getContext('2d');
                charts.fitness = new Chart(fitnessCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Best Fitness', data: data.map(g => g.bestFitness), borderColor: '#2ecc71', tension: 0.1, yAxisID: 'y' },
                            { label: 'Mean Fitness (Top 10%)', data: calculateMovingAverage(data.map(g => g.top10PercentMeanFitness), MOVING_AVERAGE_WINDOW), borderColor: '#3498db', tension: 0.1, yAxisID: 'y' },
                            { label: 'Mean Fitness (Population)', data: calculateMovingAverage(data.map(g => g.meanFitness), MOVING_AVERAGE_WINDOW), borderColor: '#f1c40f', tension: 0.1, yAxisID: 'y' },
                            { label: 'Fitness Std Dev', data: calculateMovingAverage(data.map(g => g.stdDev), MOVING_AVERAGE_WINDOW), borderColor: '#9b59b6', tension: 0.1, yAxisID: 'y', borderDash: [2, 2], pointRadius: 0 },
                            { label: 'Mutation Rate', data: data.map(g => g.mutationRate * 100), borderColor: '#e74c3c', tension: 0.1, yAxisID: 'y1', borderDash: [5, 5] }
                        ]
                    },
                    options: { scales: { y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Fitness Score' } }, y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Mutation Rate (%)' }, grid: { drawOnChartArea: false } } } }
                });

                // --- Chart 2: Champion Timeline ---
                const championCtx = document.getElementById('championChart').getContext('2d');
                const championReigns = [];
                let currentChampion = null;
                let reignStart = 0;
                data.forEach((gen, index) => {
                    if (gen.allTimeBestChromosomeId !== currentChampion) {
                        if (currentChampion !== null) {
                            championReigns.push({ id: currentChampion, start: reignStart, end: index });
                        }
                        currentChampion = gen.allTimeBestChromosomeId;
                        reignStart = index;
                    }
                });
                if (currentChampion !== null) {
                    championReigns.push({ id: currentChampion, start: reignStart, end: data.length });
                }

                const championColors = {};
                const colorPalette = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075'];
                let colorIndex = 0;
                championReigns.forEach(reign => {
                    if (!championColors[reign.id]) {
                        championColors[reign.id] = colorPalette[colorIndex % colorPalette.length];
                        colorIndex++;
                    }
                });

                charts.champion = new Chart(championCtx, {
                    type: 'bar',
                    data: {
                        labels: championReigns.map(r => `ID: ${r.id}`),
                        datasets: [{
                            label: 'Champion Reign',
                            data: championReigns.map(r => [r.start, r.end]),
                            backgroundColor: championReigns.map(r => championColors[r.id]),
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        scales: { x: { title: { display: true, text: 'Generation' } }, y: { title: { display: true, text: 'Chromosome ID' } } },
                        plugins: { legend: { display: false } }
                    }
                });


                // --- Chart 3: Population Exit Status ---
                const exitCtx = document.getElementById('exitReasonChart').getContext('2d');
                const allExitReasons = [...new Set(data.flatMap(g => Object.keys(g.exitReasonCounts)))];
                const exitDatasets = allExitReasons.map(reason => ({
                    label: reason,
                    data: calculateMovingAverage(data.map(g => g.exitReasonCounts[reason] || 0), MOVING_AVERAGE_WINDOW),
                    tension: 0.2,
                    fill: true
                }));
                charts.exit = new Chart(exitCtx, {
                    type: 'line',
                    data: { labels: labels, datasets: exitDatasets },
                    options: { scales: { x: { stacked: false }, y: { stacked: true, title: { display: true, text: 'Number of Individuals' } } } }
                });

                // --- Chart 4: Best Performer's Core Metrics ---
                const perfCtx = document.getElementById('performanceChart').getContext('2d');
                charts.performance = new Chart(perfCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Throughput Score', data: calculateMovingAverage(data.map(g => g.bestOfGenResult.throughputScore), MOVING_AVERAGE_WINDOW), borderColor: '#2ecc71', tension: 0.1, yAxisID: 'y' },
                            { label: 'Jam Penalty', data: calculateMovingAverage(data.map(g => g.bestOfGenResult.jamPenalty), MOVING_AVERAGE_WINDOW), borderColor: '#e74c3c', tension: 0.1, yAxisID: 'y' },
                            { label: 'Consistency Ratio', data: calculateMovingAverage(data.map(g => g.bestOfGenResult.consistencyRewardRatio), MOVING_AVERAGE_WINDOW), borderColor: '#3498db', tension: 0.1, yAxisID: 'y1' },
                            { label: 'Symmetry Ratio', data: calculateMovingAverage(data.map(g => g.bestOfGenResult.symmetryRewardRatio), MOVING_AVERAGE_WINDOW), borderColor: '#9b59b6', tension: 0.1, yAxisID: 'y1' }
                        ]
                    },
                    options: { scales: { y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Piece Count / Penalty' } }, y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Ratio (0-1)' }, grid: { drawOnChartArea: false }, min: 0, max: 1 } } }
                });

                // --- Chart 5: Generation Duration ---
                const durationCtx = document.getElementById('durationChart').getContext('2d');
                charts.duration = new Chart(durationCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Generation Duration (s)',
                            data: calculateMovingAverage(data.map(g => g.generationDuration / 1000), MOVING_AVERAGE_WINDOW),
                            borderColor: '#e67e22',
                            tension: 0.1,
                            fill: false
                        }]
                    },
                    options: { scales: { y: { title: { display: true, text: 'Seconds' } } } }
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>S34 Metareport Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 20px; }
        .container { max-width: 1600px; margin: auto; }
        h1, h2 { color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); gap: 20px; }
        .chart-container { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 20px; }
        .controls { background: #34495e; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 5px; transition: background-color 0.2s; }
        button:hover { background-color: #2980b9; }
        #file-status { margin-top: 10px; font-style: italic; color: #95a5a6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>S34 Metareport Visualizer</h1>
        <div class="controls">
            <button id="load-report-button">Load Meta-Report File (.json)</button>
            <input type="file" id="file-input" accept=".json" style="display: none;" />
            <p id="file-status">No report loaded. Please load a 'plinko_metareport_S34_Run[...].json' file.</p>
        </div>
        <div class="chart-grid">
            <div class="chart-container">
                <h2>Fitness Over Time</h2>
                <canvas id="fitnessChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Early Exit Reasons (Failures)</h2>
                <canvas id="exitReasonChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Run Completion Reasons</h2>
                <canvas id="runCompletionChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Best Individual's Performance Metrics</h2>
                <canvas id="performanceChart"></canvas>
            </div>
             <div class="chart-container">
                <h2>Best Individual's Penalty Scores</h2>
                <canvas id="penaltyChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Best Individual's Reward Ratios</h2>
                <canvas id="ratiosChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const MOVING_AVERAGE_WINDOW = 5;

            const loadButton = document.getElementById('load-report-button');
            const fileInput = document.getElementById('file-input');
            const fileStatus = document.getElementById('file-status');
            let charts = {};

            loadButton.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileLoad);

            function calculateMovingAverage(data, windowSize) {
                if (!data || data.length < windowSize) return data;
                let smoothedData = [];
                for (let i = 0; i < data.length; i++) {
                    const start = Math.max(0, i - windowSize + 1);
                    const end = i + 1;
                    const windowSlice = data.slice(start, end);
                    const sum = windowSlice.reduce((a, b) => a + (b || 0), 0); // Added safety for null/undefined
                    smoothedData.push(sum / windowSlice.length);
                }
                return smoothedData;
            }

            function handleFileLoad(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const reportData = JSON.parse(e.target.result);
                        if (!Array.isArray(reportData) || reportData.length === 0) {
                            throw new Error("Invalid or empty report file.");
                        }
                        fileStatus.textContent = `Loaded report for ${reportData.length} generations.`;
                        fileStatus.style.color = '#2ecc71';
                        renderCharts(reportData);
                    } catch (error) {
                        fileStatus.textContent = `Error: ${error.message}`;
                        fileStatus.style.color = '#e74c3c';
                    }
                };
                reader.readAsText(file);
            }

            function renderCharts(data) {
                Object.values(charts).forEach(chart => chart.destroy());

                const labels = data.map(gen => gen.generation);

                // --- MODIFIED Fitness Chart ---
                const fitnessCtx = document.getElementById('fitnessChart').getContext('2d');
                charts.fitness = new Chart(fitnessCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Best Fitness', data: data.map(g => g.bestFitness), borderColor: '#2ecc71', tension: 0.1, yAxisID: 'y' },
                            { label: 'Mean Fitness (Top 20)', data: calculateMovingAverage(data.map(g => g.top20MeanFitness), MOVING_AVERAGE_WINDOW), borderColor: '#3498db', tension: 0.1, yAxisID: 'y' },
                            { label: 'Mean Fitness (Population)', data: calculateMovingAverage(data.map(g => g.meanFitness), MOVING_AVERAGE_WINDOW), borderColor: '#f1c40f', tension: 0.1, yAxisID: 'y' },
                            // NEW: Dataset for Standard Deviation
                            { label: 'Fitness Std Dev', data: calculateMovingAverage(data.map(g => g.stdDev), MOVING_AVERAGE_WINDOW), borderColor: '#9b59b6', tension: 0.1, yAxisID: 'y', borderDash: [2, 2], pointRadius: 0 },
                            { label: 'Mutation Rate', data: data.map(g => g.mutationRate * 100), borderColor: '#e74c3c', tension: 0.1, yAxisID: 'y1', borderDash: [5, 5] }
                        ]
                    },
                    options: { scales: { y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Fitness Score' } }, y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Mutation Rate (%)' }, grid: { drawOnChartArea: false } } } }
                });

                // --- Early Exit Reasons (Line Chart) ---
                const exitCtx = document.getElementById('exitReasonChart').getContext('2d');
                const allExitReasons = [...new Set(data.flatMap(g => Object.keys(g.earlyExitCounts)))];
                const failureReasons = allExitReasons.filter(r => !['Stagnation', 'Completed', 'Timeout'].includes(r));
                const exitDatasets = failureReasons.map(reason => ({
                    label: reason,
                    data: calculateMovingAverage(data.map(g => g.earlyExitCounts[reason] || 0), MOVING_AVERAGE_WINDOW),
                    tension: 0.2,
                    fill: false
                }));
                charts.exit = new Chart(exitCtx, {
                    type: 'line',
                    data: { labels: labels, datasets: exitDatasets },
                    options: { scales: { x: { stacked: false }, y: { stacked: false, title: { display: true, text: 'Number of Individuals' } } } }
                });
                
                // --- Run Completion Reasons (Separate Line Chart) ---
                const completionCtx = document.getElementById('runCompletionChart').getContext('2d');
                const completionReasons = ['Stagnation', 'Completed', 'Timeout'];
                const completionDatasets = completionReasons.map(reason => ({
                    label: reason,
                    data: calculateMovingAverage(data.map(g => g.earlyExitCounts[reason] || 0), MOVING_AVERAGE_WINDOW),
                    tension: 0.2,
                    fill: false
                }));
                charts.completion = new Chart(completionCtx, {
                    type: 'line',
                    data: { labels: labels, datasets: completionDatasets },
                    options: { scales: { x: { stacked: false }, y: { stacked: false, title: { display: true, text: 'Number of Individuals' } } } }
                });

                // --- Performance Chart ---
                const perfCtx = document.getElementById('performanceChart').getContext('2d');
                charts.performance = new Chart(perfCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Throughput', data: calculateMovingAverage(data.map(g => g.bestOfGenMetrics.throughput), MOVING_AVERAGE_WINDOW), borderColor: '#2ecc71', tension: 0.1, yAxisID: 'y' },
                        ]
                    },
                    options: { scales: { y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Throughput Count' } } } }
                });

                // --- Penalty Chart (Split) ---
                const penaltyCtx = document.getElementById('penaltyChart').getContext('2d');
                charts.penalty = new Chart(penaltyCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Jam Penalty', data: calculateMovingAverage(data.map(g => g.bestOfGenMetrics.jamPenalty), MOVING_AVERAGE_WINDOW), borderColor: '#e74c3c', tension: 0.1 },
                            { label: 'Simultaneous Penalty', data: calculateMovingAverage(data.map(g => g.bestOfGenMetrics.simultaneousPenalty), MOVING_AVERAGE_WINDOW), borderColor: '#f39c12', tension: 0.1 }
                        ]
                    },
                    options: { scales: { y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Penalty Value' } } } }
                });
                
                // --- Ratios Chart (Split) ---
                const ratiosCtx = document.getElementById('ratiosChart').getContext('2d');
                charts.ratios = new Chart(ratiosCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Symmetry Reward Ratio', data: calculateMovingAverage(data.map(g => g.bestOfGenMetrics.symmetryRewardRatio), MOVING_AVERAGE_WINDOW), borderColor: '#2ecc71', tension: 0.1 },
                            { label: 'Consistency Reward Ratio (CV)', data: calculateMovingAverage(data.map(g => g.bestOfGenMetrics.consistencyRewardRatio), MOVING_AVERAGE_WINDOW), borderColor: '#9b59b6', tension: 0.1 },
                        ]
                    },
                    options: { scales: { y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Ratio (0-1)' }, min: 0 } } }
                });
            }
        });
    </script>
</body>
</html>
